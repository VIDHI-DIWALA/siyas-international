{% extends 'base.html' %}
{% block title %}Add Old Record - Siya's International{% endblock %}
{% block content %}
<div class="chalan-container" style="max-width:650px;">
    <form method="POST" class="chalan-form">
        <h3 class="section-title" style="margin-top:0;">Add Old Bill Record</h3>

        <div class="form-row">
            <div class="form-group">
                <label>Customer Name *</label>
                <input type="text" name="name" required>
            </div>
            <div class="form-group">
                <label>Contact Number *</label>
                <input type="tel" name="contact" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Product Type</label>
                <select name="product_type">
                    <option>Laptop</option><option>Desktop</option>
                    <option>Printer</option><option>Scanner</option>
                    <option>Monitor</option><option>Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Brand</label>
                <input type="text" name="brand">
            </div>
            <div class="form-group">
                <label>Model</label>
                <input type="text" name="model_no">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Device Password (if any)</label>
                <input type="text" name="password">
            </div>
            <div class="form-group">
                <label>Date</label>
                <input type="date" name="date">
            </div>
        </div>

        <div class="form-group">
            <label>Problem</label>
            <textarea name="problem" rows="2"></textarea>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Parts Received</label>
                <input type="text" name="parts_received" placeholder="e.g. Charger, Bag">
            </div>
            <div class="form-group">
                <label>Engineer</label>
                <input type="text" name="engineer">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Advance Paid (Rs.)</label>
                <input type="number" name="advance" placeholder="0">
            </div>
            <div class="form-group">
                <label>Status</label>
                <select name="status">
                    <option value="Delivered" selected>Delivered</option>
                    <option value="Ready to Pay">Ready to Pay</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Received">Received</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Remarks</label>
            <textarea name="remarks" rows="2"></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Save & Add Next</button>
    </form>
    <div class="nav-links" style="margin-top:20px;">
        <a href="/admin-dashboard">Back to Dashboard</a>
    </div>
</div>
{% endblock %}
